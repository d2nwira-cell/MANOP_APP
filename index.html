<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sistem Operasional</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="layarLoading" class="layar-loading">
    <p>Memuat data...</p>
  </div>

  <div id="layarUtama" class="hidden">
    <header class="app-header">
      <h1 id="judulHalaman">Pengajuan Baru</h1>
      <p id="infoUser">-</p>
    </header>

    <div class="tab-bar" id="tabBar">
      <button type="button" class="tab-btn active" data-tab="ajukan">Ajukan</button>
      <button type="button" class="tab-btn hidden" id="tabReview" data-tab="review">Review <span id="badgeReview" class="badge hidden">0</span></button>
    </div>

    <div id="viewAjukan">
    <main>
      <div class="section-label">Jenis Pengajuan</div>
      <div class="toggle-group" id="toggleJenis">
        <button type="button" class="active" data-jenis="Bahan Baku">Bahan Baku</button>
        <button type="button" data-jenis="Budget">Budget</button>
      </div>

      <div class="section-label">Detail Pengajuan</div>
      <div class="field">
        <label for="inputTanggalPemakaian">Tanggal Pemakaian</label>
        <input type="date" id="inputTanggalPemakaian">
      </div>
      <div class="field">
        <label for="selectLokasiTujuan">Lokasi Tujuan</label>
        <select id="selectLokasiTujuan">
          <option value="">-- Pilih lokasi --</option>
        </select>
      </div>
      <div class="field hidden" id="fieldDeskripsi">
        <label for="inputDeskripsi">Keperluan</label>
        <textarea id="inputDeskripsi" placeholder="Jelaskan rincian kebutuhan budget di sini (barang/jasa apa saja, perkiraan jumlah, dsb)"></textarea>
      </div>
      <div class="field hidden" id="fieldRekening">
        <label for="inputRekening">Rekening Tujuan</label>
        <input type="text" id="inputRekening" placeholder="Nomor rekening & nama bank">
      </div>

      <div id="areaFieldTambahan"></div>

      <div id="sectionDaftarItem">
        <div class="section-label">Daftar Item</div>
        <div id="daftarItem"></div>
        <button type="button" class="btn-tambah-item" id="btnTambahItem">+ Tambah Item</button>
      </div>

      <div class="field hidden" id="fieldJumlahBudget">
        <label for="inputJumlahBudget">Perkiraan Jumlah Budget (Rp)</label>
        <input type="number" min="0" id="inputJumlahBudget" placeholder="Contoh: 500000">
      </div>
    </main>

    <footer class="submit-bar">
      <button type="button" id="btnKirim">Kirim Pengajuan</button>
      <div class="pesan-status" id="pesanStatus"></div>
    </footer>
    </div>

    <div id="viewReview" class="hidden">
      <main>
        <div id="daftarReview">
          <p class="teks-kosong">Memuat daftar pengajuan...</p>
        </div>
      </main>
    </div>
  </div>

  <div id="layarSukses" class="layar-sukses hidden">
    <p style="font-size:40px; margin-bottom:8px;">✅</p>
    <h2 style="margin:0 0 6px;">Pengajuan Terkirim</h2>
    <p id="idPengajuanSukses">-</p>
    <p style="margin-top:16px;">Owner akan meninjau pengajuan Anda. Anda akan mendapat notifikasi begitu ada keputusan.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
